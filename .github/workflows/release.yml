name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Validate tag
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must be in vMAJOR.MINOR.PATCH format."
          }

      - name: Build with PyInstaller
        run: pyinstaller -y "PBO Builder(byRaiZo).spec"

      - name: Package release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "PBO_Builder_byRaiZo-$tag-win64.zip"
          $distDir = "dist\PBO Builder(byRaiZo)"

          if (!(Test-Path $distDir)) {
            throw "Build output not found: $distDir"
          }

          Compress-Archive -Path $distDir -DestinationPath $zipName -Force

          $hash = (Get-FileHash ".\$zipName" -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Set-Content ".\$zipName.sha256"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "PBO_Builder_byRaiZo-$tag-win64.zip"

          gh release create $tag `
            ".\$zipName" `
            ".\$zipName.sha256" `
            --repo "${{ github.repository }}" `
            --title $tag `
            --notes "Автоматическая сборка $tag"
